const ToastContext = React.createContext(null);
const useToast = () => React.useContext(ToastContext);

function ToastProvider({ children }) {
  const [toasts, setToasts] = React.useState([]);
  const push = React.useCallback((msg, type='info') => {
    const id = Math.random().toString(36).slice(2);
    setToasts((t) => [...t, { id, msg, type }]);
    setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 3000);
  }, []);
  const notReady = React.useCallback(() => push('Funkcja aktywna w pełnej wersji systemu'), [push]);
  return (
    <ToastContext.Provider value={{ push, notReady }}>
      {children}
      <div className="toast-region">
        {toasts.map(t => (
          <div key={t.id} className="toast">
            <Icon name={t.type === 'success' ? 'check' : 'info'} size={18} />
            {t.msg}
          </div>
        ))}
      </div>
    </ToastContext.Provider>
  );
}

function useHashRoute() {
  const [hash, setHash] = React.useState(() => window.location.hash.slice(1) || '/');
  React.useEffect(() => {
    const on = () => setHash(window.location.hash.slice(1) || '/');
    window.addEventListener('hashchange', on);
    return () => window.removeEventListener('hashchange', on);
  }, []);
  const navigate = React.useCallback((to) => {
    window.location.hash = to;
    window.scrollTo(0, 0);
  }, []);
  return [hash, navigate];
}

    <div className="modal-overlay" onClick={onClose}>

        )}

  );
}

function NotificationsPanel({ open, onClose }) {
  const m = window.MOCK;
  const [items, setItems] = React.useState(m.NOTIFICATIONS);
  const toast = useToast();
  const unreadCount = items.filter(n => !n.read).length;
  const markAllRead = () => setItems(items.map(n => ({ ...n, read: true })));
  const toggleRead = (id) => setItems(items.map(n => n.id === id ? { ...n, read: !n.read } : n));
  const colorFor = (type) => {
    if (type === 'danger') return { bg: 'var(--danger-bg)', fg: 'var(--danger)', border: 'var(--danger)' };
    if (type === 'warn') return { bg: 'var(--warn-bg)', fg: 'var(--warn)', border: 'var(--warn)' };
    if (type === 'success') return { bg: 'var(--success-bg)', fg: 'var(--success)', border: 'var(--success)' };
    return { bg: 'var(--info-bg)', fg: 'var(--info)', border: 'var(--info)' };
  };
  return (
    <>
      <div onClick={onClose} style={{
        position:'fixed', inset: 0, background: 'rgba(15, 23, 42, 0.3)', zIndex: 60,
        opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none',
        transition: 'opacity var(--t-mov)',
      }}/>
      <aside style={{
        position:'fixed', right: 0, top: 0, bottom: 0, width: 420, maxWidth: '90vw',
        background: 'var(--surface)', borderLeft: '1px solid var(--border-subtle)',
        boxShadow: 'var(--shadow-3)', zIndex: 61,
        display:'flex', flexDirection:'column',
        transform: open ? 'translateX(0)' : 'translateX(100%)',
        transition: 'transform var(--t-mov)',
      }}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--border-subtle)', display:'flex', alignItems:'center', gap: 10 }}>
          <Icon name="bell" size={20} />
          <div style={{ flex: 1 }}>
            <h3 style={{ marginBottom: 2 }}>Powiadomienia</h3>
            <p className="muted" style={{ fontSize: 12 }}>{unreadCount > 0 ? `${unreadCount} nieprzeczytanych` : 'Wszystko przeczytane'}</p>
          </div>
          <button className="btn btn-ghost btn-icon" onClick={onClose} aria-label="Zamknij"><Icon name="x" size={18}/></button>
        </div>
        <div style={{ padding: '12px 24px', borderBottom: '1px solid var(--border-subtle)', display:'flex', gap: 8, alignItems:'center' }}>
          <button className="btn btn-ghost" style={{ fontSize: 13, padding: '6px 10px' }} onClick={markAllRead} disabled={unreadCount === 0}>
            <Icon name="checkSimple" size={14}/> Oznacz wszystkie jako przeczytane
          </button>
          <div style={{ flex: 1 }}/>
          <button className="btn btn-ghost" style={{ fontSize: 13, padding: '6px 10px' }} onClick={() => toast.notReady()}>
            <Icon name="settings" size={14}/> Reguły
          </button>
        </div>
        <div style={{ flex: 1, overflowY: 'auto', padding: '12px 16px' }}>
          {items.length === 0 && (
            <div style={{ padding: 40, textAlign:'center', color: 'var(--text-muted)' }}>Brak powiadomień</div>
          )}
          {items.map(n => {
            const c = colorFor(n.type);
            return (
              <div key={n.id} onClick={() => toggleRead(n.id)} style={{
                padding: 14, marginBottom: 8, borderRadius: 'var(--r-md)',
                background: n.read ? 'transparent' : 'var(--surface-muted)',
                border: '1px solid var(--border-subtle)',
                borderLeft: `3px solid ${c.border}`,
                cursor: 'pointer',
                transition: 'background var(--t-base)',
                position: 'relative',
              }}
              onMouseEnter={(e) => { e.currentTarget.style.background = 'var(--surface-sunken)'; }}
              onMouseLeave={(e) => { e.currentTarget.style.background = n.read ? 'transparent' : 'var(--surface-muted)'; }}>
                <div style={{ display:'flex', alignItems:'flex-start', gap: 10 }}>
                  <div style={{ width: 32, height: 32, borderRadius: 'var(--r-sm)', background: c.bg, color: c.fg, display:'flex', alignItems:'center', justifyContent:'center', flexShrink: 0 }}>
                    <Icon name={n.icon || 'bell'} size={16}/>
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display:'flex', alignItems:'baseline', gap: 8, marginBottom: 4 }}>
                      <div style={{ fontWeight: n.read ? 500 : 600, fontSize: 13, flex: 1 }}>{n.title}</div>
                      {!n.read && <div style={{ width: 8, height: 8, borderRadius: 99, background: c.border, flexShrink: 0 }}/>}
                    </div>
                    <p className="muted" style={{ fontSize: 12, lineHeight: 1.5, marginBottom: 6 }}>{n.body}</p>
                    <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>{n.when}</div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ padding: '14px 24px', borderTop: '1px solid var(--border-subtle)', fontSize: 11, color: 'var(--text-muted)', display:'flex', alignItems:'center', gap: 6 }}>
          <Icon name="info" size={12}/>
          <span>3 reguły alertów aktywne od dnia 1 (zaleganie paczek, progi stanów, konflikty synchronizacji). Kolejne reguły konfigurowalne w Etapie 2.</span>
        </div>
      </aside>
    </>
  );
}

function MagazynPaczkiPage({ navigate, initialFilter, viewMode = 'paczki' }) {
  const m = window.MOCK;
  const [species, setSpecies] = React.useState([]);
  const [thickness, setThickness] = React.useState([]);
  const [status, setStatus] = React.useState([]);
  const [onlyStale, setOnlyStale] = React.useState(initialFilter === 'zalegajace');
  const [search, setSearch] = React.useState('');
  const toast = useToast();
  const toggle = (arr, set, v) => arr.includes(v) ? set(arr.filter(x => x !== v)) : set([...arr, v]);
  const filtered = m.PACKS.filter(p => {
    if (species.length && !species.includes(p.species)) return false;
    if (thickness.length && !thickness.includes(p.th)) return false;
    if (status.length && !status.includes(p.status)) return false;
    if (onlyStale && !p.stale) return false;
    if (search && !p.id.toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });
  const aggregated = React.useMemo(() => {
    const map = {};
    filtered.forEach(p => {
      const key = p.species + '|' + p.th;
      if (!map[key]) map[key] = { species: p.species, th: p.th, packs: 0, boards: 0, vol: 0, locations: new Set(), staleBoards: 0, oldest: p.days };
      map[key].packs += 1; map[key].boards += p.boards; map[key].vol += p.vol;
      map[key].locations.add(p.loc.split('/')[0]);
      if (p.stale) map[key].staleBoards += p.boards;
      if (p.days > map[key].oldest) map[key].oldest = p.days;
    });
    return Object.values(map).sort((a,b) => b.vol - a.vol);
  }, [filtered]);
  const totalVol = filtered.reduce((s, p) => s + p.vol, 0);
  const totalBoards = filtered.reduce((s, p) => s + p.boards, 0);
  return (
    <>
      <PageTitle title="Magazyn"
        subtitle={viewMode === 'deski' ? `${aggregated.length} kombinacji · ${totalBoards} desek · ${totalVol.toFixed(2)} m³` : `${filtered.length} z ${m.PACKS.length} paczek · ${totalVol.toFixed(2)} m³`}
        actions={<>
          <div style={{ display:'flex', border:'1px solid var(--border-strong)', borderRadius: 8, overflow:'hidden' }}>
            <button className="btn btn-ghost" style={{ borderRadius: 0, background: viewMode === 'paczki' ? 'var(--accent)' : 'transparent', color: viewMode === 'paczki' ? 'white' : 'var(--text)', minHeight: 38 }} onClick={() => navigate('/panel/magazyn/paczki')}>Paczki</button>
            <button className="btn btn-ghost" style={{ borderRadius: 0, background: viewMode === 'deski' ? 'var(--accent)' : 'transparent', color: viewMode === 'deski' ? 'white' : 'var(--text)', minHeight: 38 }} onClick={() => navigate('/panel/magazyn/deski')}>Deski</button>
            <button className="btn btn-ghost" style={{ borderRadius: 0, minHeight: 38 }} onClick={() => navigate('/panel/magazyn/widok-2d')}>Widok 2D</button>
          </div>
          <button className="btn btn-secondary" onClick={() => toast.notReady()}><Icon name="download" size={16}/> Eksportuj</button>
          <button className="btn btn-primary" onClick={() => toast.notReady()}><Icon name="plus" size={16}/> Dodaj ręcznie</button>
        </>}/>
      <div className="card" style={{ padding: 16, marginBottom: 16 }}>
        <div style={{ display:'flex', alignItems:'center', gap: 10, flexWrap: 'wrap' }}>
          {viewMode === 'paczki' && (<>
            <div style={{ position:'relative', width: 280 }}>
              <Icon name="search" size={16} style={{ position:'absolute', left: 12, top: 12, color:'var(--text-muted)' }}/>
              <input className="input" placeholder="Szukaj po numerze paczki..." value={search} onChange={(e)=>setSearch(e.target.value)} style={{ paddingLeft: 34 }}/>
            </div>
            <div style={{ width: 1, height: 24, background:'var(--border-subtle)' }}/>
          </>)}
          <span className="eyebrow" style={{ marginRight: 4 }}>Gatunek</span>
          {m.SPECIES.map(s => <FilterChip key={s.code} active={species.includes(s.name)} onClick={() => toggle(species, setSpecies, s.name)}>{s.name}</FilterChip>)}
          <div style={{ width: 1, height: 24, background:'var(--border-subtle)' }}/>
          <span className="eyebrow" style={{ marginRight: 4 }}>Grubość</span>
          {m.THICKNESS.map(t => <FilterChip key={t} active={thickness.includes(t)} onClick={() => toggle(thickness, setThickness, t)}>{t}</FilterChip>)}
          {viewMode === 'paczki' && (<>
            <div style={{ width: 1, height: 24, background:'var(--border-subtle)' }}/>
            <FilterChip active={onlyStale} onClick={() => setOnlyStale(!onlyStale)}>Tylko zalegające</FilterChip>
          </>)}
        </div>
      </div>
      {viewMode === 'deski' ? (
        <section className="card" style={{ padding: 0, overflow:'hidden' }}>
          <table className="table">
            <thead><tr><th>Gatunek</th><th style={{ textAlign:'right' }}>Grubość</th><th style={{ textAlign:'right' }}>Paczki</th><th style={{ textAlign:'right' }}>Desek łącznie</th><th style={{ textAlign:'right' }}>m³</th><th>Lokalizacje</th><th style={{ textAlign:'right' }}>Najstarsza</th><th>Status</th></tr></thead>
            <tbody>
              {aggregated.map((a, i) => (
                <tr key={i} className="clickable" onClick={() => { setSpecies([a.species]); setThickness([a.th]); navigate('/panel/magazyn/paczki'); }}>
                  <td style={{ fontWeight: 500 }}>{a.species}</td>
                  <td className="tabular" style={{ textAlign:'right' }}>{a.th} mm</td>
                  <td className="tabular" style={{ textAlign:'right' }}>{a.packs}</td>
                  <td className="tabular" style={{ textAlign:'right', fontWeight: 600 }}>{a.boards}</td>

function Widok2DPage({ navigate }) {
  const m = window.MOCK;
  const [selected, setSelected] = React.useState(null);
  const segments = React.useMemo(() => {
    const segs = {};
    ['A','B','C','D'].forEach(r => { for (let i = 1; i <= 4; i++) { const id = r + i; segs[id] = { id, rack: r, num: i, packs: [], vol: 0, count: 0, total: 10 }; } });
    m.PACKS.forEach(p => { const seg = p.loc.split('/')[0]; if (segs[seg]) { segs[seg].packs.push(p); segs[seg].vol += p.vol; segs[seg].count += 1; } });
    return segs;
  }, [m.PACKS]);
  const selectedSeg = selected ? segments[selected] : null;
  const SegmentBox = ({ id, x, y, w, h }) => {
    const seg = segments[id];
    const fill = seg.count / seg.total;
    const hasStale = seg.packs.some(p => p.stale);
    const color = seg.count === 0 ? '#F7F7F5' : hasStale ? '#FEE2E2' : fill > 0.7 ? '#FEF3C7' : '#DCFCE7';
    const stroke = seg.count === 0 ? '#D4D4D0' : hasStale ? '#DC2626' : fill > 0.7 ? '#A16207' : '#16A34A';
    const textColor = seg.count === 0 ? '#94A3B8' : '#0F172A';
    return (
      <g onClick={() => setSelected(id)} style={{ cursor:'pointer' }}>
        <rect x={x} y={y} width={w} height={h} rx="6" fill={color} stroke={stroke} strokeWidth="1.5" style={{ transition: 'all 150ms' }}/>
        <text x={x + 10} y={y + 18} fontSize="12" fontWeight="700" fill={textColor}>{id}</text>
        <text x={x + w - 10} y={y + 18} fontSize="11" fontWeight="600" textAnchor="end" fill={textColor}>{seg.count}/{seg.total}</text>
        {seg.count > 0 && (<text x={x + w/2} y={y + h - 10} fontSize="11" fontWeight="500" textAnchor="middle" fill={textColor}>{seg.vol.toFixed(1)} m³</text>)}
        {hasStale && (<circle cx={x + w - 8} cy={y + 8} r="4" fill="#DC2626"/>)}
      </g>
    );
  };
  const segW = 180, segH = 70, gap = 8;
  return (
    <>
      <PageTitle title="Mapa magazynu" subtitle="Widok 2D hali · 16 segmentów · kliknij, aby zobaczyć zawartość"
        actions={<div style={{ display:'flex', border:'1px solid var(--border-strong)', borderRadius: 8, overflow:'hidden' }}>
          <button className="btn btn-ghost" style={{ borderRadius: 0, minHeight: 38 }} onClick={() => navigate('/panel/magazyn/paczki')}>Lista</button>
          <button className="btn btn-ghost" style={{ borderRadius: 0, background:'var(--accent)', color:'white', minHeight: 38 }}>Widok 2D</button>
        </div>}/>
      <div className="card" style={{ padding:'12px 16px', marginBottom: 16, display:'flex', gap: 24, alignItems:'center', fontSize: 13 }}>
        <span className="eyebrow">Legenda:</span>
        <div style={{ display:'flex', alignItems:'center', gap: 6 }}><div style={{ width: 14, height: 14, background:'#DCFCE7', border:'1.5px solid #16A34A', borderRadius: 3 }}/>Dostępne (&lt;70%)</div>
        <div style={{ display:'flex', alignItems:'center', gap: 6 }}><div style={{ width: 14, height: 14, background:'#FEF3C7', border:'1.5px solid #A16207', borderRadius: 3 }}/>Bliskie pełnego</div>
        <div style={{ display:'flex', alignItems:'center', gap: 6 }}><div style={{ width: 14, height: 14, background:'#FEE2E2', border:'1.5px solid #DC2626', borderRadius: 3 }}/>Zalegające paczki</div>
        <div style={{ display:'flex', alignItems:'center', gap: 6 }}><div style={{ width: 14, height: 14, background:'#F7F7F5', border:'1.5px dashed #D4D4D0', borderRadius: 3 }}/>Puste</div>
      </div>
      <section className="card card-pad-lg" style={{ padding: 40, overflowX: 'auto' }}>
        <svg viewBox="0 0 840 560" style={{ width:'100%', minWidth: 600, height: 'auto', display:'block' }}>
          <rect x="20" y="20" width="800" height="520" rx="16" fill="#FAFAF8" stroke="#D4D4D0" strokeWidth="1.5" strokeDasharray="4 4" />
          <text x="40" y="46" fontSize="11" fontWeight="600" letterSpacing="2" fill="#94A3B8">HALA MAGAZYNU · BUDOWNICTWO PIOTR SKRZYPEK</text>
          <text x={40} y={75} fontSize="11" fontWeight="700" fill="#475569" letterSpacing="1">REGAŁ A</text>
          {['A1','A2','A3','A4'].map((id, i) => (<SegmentBox key={id} id={id} x={60 + i * (segW + gap)} y={85} w={segW} h={segH}/>))}
          <text x={40} y={195} fontSize="11" fontWeight="700" fill="#475569" letterSpacing="1">REGAŁ B</text>
          {['B1','B2','B3','B4'].map((id, i) => (<SegmentBox key={id} id={id} x={60 + i * (segW + gap)} y={205} w={segW} h={segH}/>))}
          <line x1="60" y1="295" x2="820" y2="295" stroke="#D4D4D0" strokeDasharray="6 4" strokeWidth="1"/>
          <text x={440} y={315} fontSize="10" fill="#94A3B8" textAnchor="middle" letterSpacing="3">KORYTARZ ROBOCZY</text>

          {['A','B','C','D'].map(r => {
            const rackSegs = Object.values(segments).filter(s => s.rack === r);
            const count = rackSegs.reduce((s, x) => s + x.count, 0);
            const total = rackSegs.reduce((s, x) => s + x.total, 0);

            return (

                <div className="muted" style={{ fontSize: 11, marginTop: 6 }}>{vol.toFixed(1)} m³ · {pct}% zapełnienia</div>

  );

function KlienciPage({ navigate }) {

    <>

          <button className="btn btn-secondary" onClick={() => toast.notReady()}><Icon name="download" size={16}/> Eksportuj</button>

function BoardPickerModal({ onClose, onAdd }) {
  const m = window.MOCK;
  const boards = [];
  m.PACKS.filter(p => p.status === 'available').slice(0, 12).forEach(p => {
    for (let i = 1; i <= 6; i++) {
      const wid = 160 + (i * 10);
      const len = i % 2 === 0 ? 2500 : 2700;
      const cls = (i % 3) + 1;
      const vol = (len * wid * p.th) / 1e9;
      const price = vol * (m.PRICES[p.species]?.[cls] || 2000);
      boards.push({ id: p.id + '-#' + i, pack: p.id, board: '#' + i, species: p.species, th: p.th, cls, dims: `${len}×${wid}×${p.th}`, vol, price });
    }
  });
  const [species, setSpecies] = React.useState([]);
  const [thickness, setThickness] = React.useState([]);
  const [selected, setSelected] = React.useState({});
  const toggle = (arr, set, v) => arr.includes(v) ? set(arr.filter(x => x !== v)) : set([...arr, v]);
  const filtered = boards.filter(b => {
    if (species.length && !species.includes(b.species)) return false;
    if (thickness.length && !thickness.includes(b.th)) return false;
    return true;
  });
  const selList = Object.keys(selected).filter(k => selected[k]).map(k => filtered.find(b => b.id === k)).filter(Boolean);
  const selVol = selList.reduce((s, b) => s + b.vol, 0);
  const selPrice = selList.reduce((s, b) => s + b.price, 0);
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal modal-xl" onClick={(e) => e.stopPropagation()}>
        <div className="modal-header">
          <h3 style={{ flex: 1 }}>Wybierz deski z magazynu</h3>
          <button className="btn btn-ghost btn-icon" onClick={onClose}><Icon name="x" size={18}/></button>
        </div>
        <div className="modal-body" style={{ padding: 0 }}>
          <div style={{ padding: 16, borderBottom:'1px solid var(--border-subtle)', display:'flex', gap: 8, flexWrap:'wrap', alignItems:'center' }}>
            <span className="eyebrow" style={{ marginRight: 4 }}>Gatunek</span>
            {m.SPECIES.map(s => <FilterChip key={s.code} active={species.includes(s.name)} onClick={() => toggle(species, setSpecies, s.name)}>{s.name}</FilterChip>)}
            <div style={{ width: 1, height: 20, background:'var(--border-subtle)', margin:'0 4px' }}/>
            <span className="eyebrow" style={{ marginRight: 4 }}>Grubość</span>
            {m.THICKNESS.map(t => <FilterChip key={t} active={thickness.includes(t)} onClick={() => toggle(thickness, setThickness, t)}>{t} mm</FilterChip>)}
          </div>
          <div style={{ maxHeight: 400, overflow:'auto' }}>
            <table className="table">
              <thead><tr><th style={{ width: 40 }}></th><th>Z paczki</th><th>Gatunek</th><th>Wymiary</th><th>Kl.</th><th style={{ textAlign:'right' }}>m³</th><th style={{ textAlign:'right' }}>Cena</th></tr></thead>
              <tbody>
                {filtered.slice(0, 40).map(b => (
                  <tr key={b.id} style={{ cursor:'pointer' }} onClick={() => setSelected({ ...selected, [b.id]: !selected[b.id] })}>
                    <td><input type="checkbox" checked={!!selected[b.id]} onChange={()=>{}}/></td>
                    <td><span className="code" style={{ fontSize: 12 }}>{b.pack} {b.board}</span></td>
                    <td>{b.species} · {b.th}mm</td>
                    <td className="tabular">{b.dims}</td>
                    <td>{b.cls}</td>
                    <td className="tabular" style={{ textAlign:'right' }}>{b.vol.toFixed(3)}</td>
                    <td className="tabular" style={{ textAlign:'right' }}>{b.price.toFixed(2)} zł</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
        <div className="modal-footer">
          <div style={{ flex: 1, fontSize: 13 }}>
            <strong className="tabular">Wybrane: {selList.length} desek</strong>
            <span className="muted"> · {selVol.toFixed(3)} m³ · {fmtPLN(selPrice)}</span>

function DonutChart({ data, size = 200 }) {
  const cx = size/2, cy = size/2, r = size/2 - 10, inner = r - 30;
  let acc = 0;
  const total = data.reduce((s, d) => s + d.vol, 0);
  const arcs = data.map(d => {
    const start = (acc / total) * Math.PI * 2 - Math.PI/2;
    acc += d.vol;
    const end = (acc / total) * Math.PI * 2 - Math.PI/2;
    const x1 = cx + Math.cos(start) * r, y1 = cy + Math.sin(start) * r;
    const x2 = cx + Math.cos(end) * r, y2 = cy + Math.sin(end) * r;
    const x3 = cx + Math.cos(end) * inner, y3 = cy + Math.sin(end) * inner;
    const x4 = cx + Math.cos(start) * inner, y4 = cy + Math.sin(start) * inner;
    const large = end - start > Math.PI ? 1 : 0;
    return { d, path: `M ${x1} ${y1} A ${r} ${r} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${inner} ${inner} 0 ${large} 0 ${x4} ${y4} Z` };
  });
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {arcs.map((a, i) => <path key={i} d={a.path} fill={a.d.color}/>)}
      <text x={cx} y={cy - 2} textAnchor="middle" fontSize="11" fill="#94A3B8" letterSpacing="2">SUMA</text>
      <text x={cx} y={cy + 18} textAnchor="middle" fontSize="18" fontWeight="700" fill="#0F172A">{fmtNum(total)} m³</text>
    </svg>
  );
}

function BarChart({ data, max }) {
  const maxV = max || Math.max(...data.map(d => d.vol));
  return (

function TerminalShell({ children, onExit, onPanel, operator = 'Monika', stage, onHome }) {

    return () => clearInterval(i);

  const hh = String(time.getHours()).padStart(2, '0');
  const mm = String(time.getMinutes()).padStart(2, '0');
  return (
    <div style={{ position:'fixed', inset: 0, background:'linear-gradient(180deg, #0A0E14 0%, #111821 100%)', color:'#F5F5F0', fontSize: 18, display:'flex', flexDirection:'column' }}>

          <div style={{ fontSize: 14, fontWeight: 700, letterSpacing:'-0.01em', lineHeight: 1.2 }}>Sucha-tarcica</div>
          <div style={{ fontSize: 11, color:'rgba(245,245,240,0.5)' }}>{stage || 'Terminal hali'}</div>
        </div>
        <div style={{ flex: 1 }}/>
        <div className="tabular" style={{ fontSize: 12, color:'rgba(245,245,240,0.5)', textAlign:'right', lineHeight: 1.4 }}>
          <div style={{ fontSize: 16, fontWeight: 600, color:'#F5F5F0' }}>{hh}:{mm}</div>
        </div>
        <div style={{ width: 1, height: 32, background:'rgba(255,255,255,0.1)', margin:'0 4px' }}/>
        <div style={{ display:'flex', alignItems:'center', gap: 8, padding:'4px 10px', background:'rgba(255,255,255,0.05)', borderRadius: 99 }}>

        {onPanel && <button onClick={onPanel} style={{ marginLeft: 4, background:'rgba(255,255,255,0.07)', border:'1px solid rgba(255,255,255,0.15)', color:'rgba(245,245,240,0.9)', padding:'8px 12px', borderRadius: 8, cursor:'pointer', fontSize: 12, display:'flex', alignItems:'center', gap: 5 }}><Icon name="monitor" size={14}/> Panel</button>}

}

function StepIndicator({ step, labels }) {
  const { compact } = useTerminalSize();
  if (compact) {
    const pct = Math.round((step / labels.length) * 100);
    return (
      <div style={{ marginBottom: 20 }}>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom: 8 }}>
          <div style={{ fontSize: 13, color:'rgba(245,245,240,0.5)', fontWeight: 600, textTransform:'uppercase', letterSpacing:'0.08em' }}>
            Krok {step} / {labels.length}
          </div>
          <div style={{ fontSize: 13, fontWeight: 700, color:'white' }}>{labels[step - 1]}</div>
        </div>
        <div style={{ height: 6, background:'rgba(255,255,255,0.1)', borderRadius: 99, overflow:'hidden' }}>
          <div style={{ width: pct + '%', height:'100%', background:'var(--accent)', borderRadius: 99, transition:'width 300ms ease' }}/>
        </div>
      </div>
    );
  }
  return (
    <div style={{ display:'flex', alignItems:'center', gap: 0, marginBottom: 32 }}>
      {labels.map((label, i) => {
        const n = i + 1;
        const done = n < step;
        const active = n === step;
        return (
          <React.Fragment key={n}>
            <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap: 8, minWidth: 110 }}>
              <div style={{ width: 40, height: 40, borderRadius: 99, background: done ? 'var(--accent)' : active ? 'var(--accent)' : 'rgba(255,255,255,0.08)', color: (done || active) ? 'white' : 'rgba(245,245,240,0.4)', display:'flex', alignItems:'center', justifyContent:'center', fontWeight: 700, fontSize: 16, boxShadow: active ? '0 0 0 6px rgba(122, 55, 6, 0.2)' : 'none', transition: 'all 200ms' }}>{done ? <Icon name="check" size={20}/> : n}</div>
              <div style={{ fontSize: 11, color: active ? 'white' : 'rgba(245,245,240,0.5)', fontWeight: active ? 600 : 400, textAlign:'center' }}>{label}</div>
            </div>
            {i < labels.length - 1 && <div style={{ flex: 1, height: 2, background: done ? 'var(--accent)' : 'rgba(255,255,255,0.08)', marginBottom: 24 }}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
}

function BoardEditor({ draft, setDraft, n, onCancel, onSave, onAddAnother }) {
  const { compact } = useTerminalSize();
  const [focus, setFocus] = React.useState('wid');
  const handleKey = (k) => {
    const cur = draft[focus];
    let v;
    if (k === 'C') v = 0;
    else if (k === '⌫') v = Math.floor(cur / 10);
    else v = +(String(cur) + k).slice(0, focus === 'wid' ? 3 : 4);
    setDraft({ ...draft, [focus]: v });
  };
  const vol = (draft.len * draft.wid * draft.th) / 1e9;
  const classes = [1, 2, 3];
  if (compact) {
    return (
      <>
        <div style={{ display:'flex', alignItems:'center', gap: 12, marginBottom: 14 }}>
          <div style={{ width: 40, height: 40, borderRadius: 10, background:'var(--accent)', display:'flex', alignItems:'center', justifyContent:'center', fontSize: 17, fontWeight: 700, color:'white', flexShrink: 0 }}>#{n}</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 17, fontWeight: 700 }}>Deska #{n}</div>

        </div>
        <div style={{ fontSize: 11, color:'rgba(245,245,240,0.5)', textTransform:'uppercase', letterSpacing:'0.08em', marginBottom: 8, fontWeight: 600 }}>

            <div key={f} onClick={() => setFocus(f)} style={{ padding: 10, borderRadius: 10, background: focus === f ? 'rgba(122,55,6,0.35)' : 'rgba(255,255,255,0.04)', border: '2px solid ' + (focus === f ? 'var(--accent)' : 'rgba(255,255,255,0.08)'), cursor:'pointer', textAlign:'center' }}>
              <div style={{ fontSize: 10, color:'rgba(245,245,240,0.5)', letterSpacing:'0.08em', marginBottom: 4 }}>{label}</div>

function StepBoardList({ data, setData }) {
  const [editing, setEditing] = React.useState(null);
  const [draft, setDraft] = React.useState(null);
  const openAdd = () => { setDraft({ cls: 1, wid: 0, th: data.th, len: data.length }); setEditing('new'); };
  const openEdit = (i) => { setDraft({ ...data.boards[i] }); setEditing(i); };
  const saveBoard = () => {
    const vol = (draft.len * draft.wid * draft.th) / 1e9;
    const b = { ...draft, vol };
    let boards;
    if (editing === 'new') { boards = [...data.boards, { ...b, n: data.boards.length + 1 }]; }
    else { boards = [...data.boards]; boards[editing] = { ...b, n: boards[editing].n }; }
    setData({ ...data, boards });
    setEditing(null); setDraft(null);
  };
  const addAndNext = () => {
    saveBoard();
    setTimeout(() => { setDraft({ cls: 1, wid: 0, th: data.th, len: data.length }); setEditing('new'); }, 50);
  };
  const removeBoard = (i) => {
    const boards = data.boards.filter((_, j) => j !== i).map((b, idx) => ({ ...b, n: idx + 1 }));
    setData({ ...data, boards });
  };
  const totalVol = data.boards.reduce((s, b) => s + b.vol, 0);
  if (editing !== null && draft) {
    return <BoardEditor draft={draft} setDraft={setDraft} n={editing === 'new' ? data.boards.length + 1 : data.boards[editing].n}
      onCancel={() => { setEditing(null); setDraft(null); }} onSave={saveBoard}
      onAddAnother={editing === 'new' ? addAndNext : null}/>;

function FakeQR({ size = 120 }) {
  const n = 21;
  const cells = [];
  for (let y = 0; y < n; y++) {
    for (let x = 0; x < n; x++) {
      const k = (x * 7 + y * 13 + x * y) % 3;
      cells.push({ x, y, on: k === 0 });
    }
  }
  const finders = [[0,0], [n-7, 0], [0, n-7]];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${n} ${n}`}>
      <rect width={n} height={n} fill="white"/>
      {cells.map((c, i) => c.on && <rect key={i} x={c.x} y={c.y} width="1" height="1" fill="#0F172A"/>)}
      {finders.map(([fx, fy], i) => (
        <g key={i}>
          <rect x={fx} y={fy} width="7" height="7" fill="white"/>
          <rect x={fx} y={fy} width="7" height="7" fill="none" stroke="#0F172A" strokeWidth="1"/>
          <rect x={fx+2} y={fy+2} width="3" height="3" fill="#0F172A"/>
        </g>
      ))}
    </svg>
  );
}

function TerminalNewPackFlow({ onExit, onHome, onDone }) {
  const { compact } = useTerminalSize();
  const [step, setStep] = React.useState(1);
  const [data, setData] = React.useState({ kiln: 'K-01', species: 'Dąb', th: 40, length: 2100, boards: [], location: null });
  const labels = ['Suszarnia', 'Parametry', 'Deski', 'Miejsce', 'Etykieta', 'Potwierdź'];
  const vol = data.boards.reduce((s, b) => s + b.vol, 0);
  const packId = `${data.species[0]}-${data.th}-20260410-009`;
  const next = () => step < 6 && setStep(step + 1);
  const prev = () => step > 1 && setStep(step - 1);
  const canNext = step !== 3 || data.boards.length > 0;
  return (
    <TerminalShell onExit={onExit} onHome={onHome} stage={`Nowa paczka · krok ${step}/6`}>
      <div style={{ maxWidth: compact ? '100%' : 1100, margin:'0 auto' }}>
        <StepIndicator step={step} labels={labels}/>
        <div style={{ background:'rgba(255,255,255,0.04)', border:'1px solid rgba(255,255,255,0.08)', borderRadius: 16, padding: compact ? 16 : 40, minHeight: compact ? 0 : 480 }}>
          {step === 1 && <StepKiln data={data} setData={setData}/>}
          {step === 2 && <StepParams data={data} setData={setData}/>}
          {step === 3 && <StepBoardList data={data} setData={setData}/>}
          {step === 4 && <StepLocation data={data} setData={setData}/>}
          {step === 5 && <StepLabel data={data} packId={packId} vol={vol}/>}
          {step === 6 && <StepConfirm data={data} packId={packId} vol={vol}/>}
        </div>
        <div style={{ display:'flex', gap: compact ? 10 : 14, marginTop: compact ? 14 : 24 }}>
          <button onClick={prev} disabled={step === 1} style={{ padding: compact ? '14px 18px' : '18px 28px', borderRadius: 12, background:'rgba(255,255,255,0.05)', border:'1px solid rgba(255,255,255,0.1)', color:'white', fontSize: compact ? 14 : 16, fontWeight: 600, cursor: step === 1 ? 'not-allowed' : 'pointer', opacity: step === 1 ? 0.4 : 1, display:'flex', alignItems:'center', gap: 8 }}><Icon name="arrowLeft" size={16}/> {compact ? '' : 'Wstecz'}</button>
          <div style={{ flex: 1 }}/>
          {step < 6 ? (
            <button onClick={next} disabled={!canNext} style={{ padding: compact ? '14px 20px' : '18px 32px', borderRadius: 12, background: canNext ? 'var(--accent)' : 'rgba(255,255,255,0.1)', border:'none', color:'white', fontSize: compact ? 14 : 16, fontWeight: 700, cursor: canNext ? 'pointer' : 'not-allowed', opacity: canNext ? 1 : 0.4, display:'flex', alignItems:'center', gap: 8, boxShadow: canNext ? '0 8px 24px rgba(122, 55, 6, 0.3)' : 'none' }}>
              {step === 3 ? `Zatwierdź (${data.boards.length})` : 'Dalej'}
              <Icon name="arrowRight" size={compact ? 16 : 18}/>
            </button>
          ) : (
            <button onClick={() => onDone({ packId, ...data, vol })} style={{ padding: compact ? '14px 20px' : '18px 32px', borderRadius: 12, background:'#059669', border:'none', color:'white', fontSize: compact ? 14 : 16, fontWeight: 700, cursor:'pointer', display:'flex', alignItems:'center', gap: 8, boxShadow:'0 8px 24px rgba(5, 150, 105, 0.3)' }}><Icon name="check" size={compact ? 16 : 18}/> {compact ? 'Zapisz' : 'Zapisz w systemie'}</button>
          )}
        </div>
      </div>
    </TerminalShell>
  );
}

function TerminalDeviceFrame({ children }) {
  const [mode, setMode] = React.useState('tc21');

    { id: 'tc21', label: 'Zebra TC21', w: 400, h: 700, radius: 24, borderW: 10 },
    { id: 'tablet7', label: 'Tablet 7"', w: 720, h: 520, radius: 14, borderW: 8 },
    { id: 'full', label: 'Pełny ekran', w: null, h: null },
  ];
  const cur = modes.find(m => m.id === mode);
  const wrapped = <TerminalSizeCtx.Provider value={{ compact }}>{children}</TerminalSizeCtx.Provider>;

  const modeBar = (
    <div style={{ display:'flex', gap: 2, padding: '6px', background:'rgba(255,255,255,0.05)', borderRadius: 99, border:'1px solid rgba(255,255,255,0.1)' }}>
      {modes.map(m => (
        <button key={m.id} onClick={() => setMode(m.id)} style={{
          padding: '6px 14px', borderRadius: 99, border:'none', cursor:'pointer',

          color: mode === m.id ? 'white' : 'rgba(245,245,240,0.55)',
          fontSize: 12, fontWeight: mode === m.id ? 600 : 400, transition:'all 150ms',
        }}>{m.label}</button>

  if (mode === 'full') {
    return (
      <div style={{ position:'relative' }}>
        <div style={{ position:'fixed', bottom: 16, right: 16, zIndex: 200 }}>{modeBar}</div>
        <div style={{ position:'fixed', inset: 0 }}>{wrapped}</div>
      </div>
    );
  }

  return (
    <div style={{
      minHeight:'100vh', background:'linear-gradient(145deg, #0b1120 0%, #0f1c30 100%)',
      display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding: 32, gap: 20,
    }}>
      {modeBar}
      <div style={{
        position:'relative', width: cur.w, height: cur.h,
        borderRadius: cur.radius, border: `${cur.borderW}px solid #1e2c3a`,
        overflow:'hidden', flexShrink: 0,
        boxShadow:'0 40px 100px rgba(0,0,0,0.75), 0 0 0 1px rgba(255,255,255,0.04)',

        {mode === 'tc21' && (
          <div style={{ position:'absolute', top: -cur.borderW, left:'50%', transform:'translateX(-50%)', width: 60, height: 4, background:'#2a3a4a', borderRadius:'0 0 4px 4px', zIndex: 10 }}/>

        {wrapped}
      </div>
      <div style={{ fontSize: 11, color:'rgba(245,245,240,0.25)', textAlign:'center', letterSpacing:'0.04em' }}>
        {mode === 'tc21' ? 'ZEBRA TC21 · 4.3" · Ekran dotykowy' : 'TABLET 7" · Widok poziomy · Montaż ścienny lub biurkowy'}
      </div>
    </div>
  );
}

            </div>
            <div className="eyebrow" style={{ marginBottom: 6, color:'rgba(255,255,255,0.5)' }}>Dla operatora</div>
            <h2 style={{ fontSize: 24, marginBottom: 10, color:'white' }}>Terminal hali</h2>
            <p style={{ fontSize: 14, marginBottom: 20, flex: 1, color:'rgba(255,255,255,0.7)' }}>
              Duży, dotykowy interfejs do przyjmowania paczek. 6 kroków, rękawice, hałas, pośpiech.
            </p>
            <div style={{ display:'flex', alignItems:'center', gap: 8, fontSize: 13, fontWeight: 500, color:'#FBBF24' }}>
              Uruchom terminal <Icon name="arrowRight" size={16}/>
            </div>
          </button>
        </div>
        <div style={{ textAlign:'center', marginTop: 40, fontSize: 12, color:'var(--text-muted)' }}>
          Wersja demonstracyjna · Etap 1 · Kwiecień 2026
        </div>
      </div>
    </div>
  );
}

function parseQuery(str) {
  const q = {};
  (str || '').split('&').filter(Boolean).forEach(p => {
    const [k, v] = p.split('='); q[decodeURIComponent(k)] = decodeURIComponent(v || '');
  });
  return q;
}

function App() {
  const [route, navigate] = useHashRoute();
  const [loggedIn, setLoggedIn] = React.useState(false);
  const [termStage, setTermStage] = React.useState('home');
  const [lastPack, setLastPack] = React.useState(null);
  const [path, qs] = route.split('?');
  const query = parseQuery(qs);
  const segs = path.split('/').filter(Boolean);

  if (segs.length === 0) {
    return <HubStart onPanel={() => navigate('/panel')} onTerminal={() => navigate('/terminal')} />;
  }

  if (segs[0] === 'terminal') {
    const toHome = () => setTermStage('home');
    const toPanel = () => navigate('/panel/dashboard');
    const onExit = () => navigate('/');
    if (termStage === 'done' && lastPack) {
      return <TerminalDonePage packId={lastPack} onHome={() => { setTermStage('home'); setLastPack(null); }} onNewPack={() => setTermStage('flow')}/>;
    }
    if (termStage === 'flow') {
      return <TerminalNewPackFlow onExit={onExit} onHome={toHome} onDone={(d) => { setLastPack(d.packId); setTermStage('done'); }}/>;
    }
    if (termStage === 'scan') {
      return <TerminalScanPage onHome={toHome} onExit={onExit} onPanel={toPanel}/>;
    }
    return <TerminalHomePage onExit={onExit} onPanel={toPanel} onStartNewPack={() => setTermStage('flow')} onScan={() => setTermStage('scan')} onContinuePack={() => setTermStage('flow')} draft={null}/>;
  }

  if (segs[0] === 'panel') {
    if (!loggedIn) {
      return <LoginScreen onLogin={() => { setLoggedIn(true); if (segs.length < 2) navigate('/panel/dashboard'); }}/>;
    }
    const onLogout = () => { setLoggedIn(false); navigate('/'); };
    let page = null;
    if (segs.length < 2 || segs[1] === 'dashboard') {
      page = <DashboardPage navigate={navigate}/>;
    } else if (segs[1] === 'magazyn') {
      if (segs[2] === 'paczki' && segs[3]) {
        page = <PaczkaDetailPage navigate={navigate} packId={segs[3]}/>;
      } else if (segs[2] === 'widok-2d') {
        page = <Widok2DPage navigate={navigate}/>;
      } else if (segs[2] === 'deski') {
        page = <MagazynPaczkiPage navigate={navigate} viewMode="deski"/>;
      } else {
        page = <MagazynPaczkiPage navigate={navigate} initialFilter={query.filter} viewMode="paczki"/>;
      }
    } else if (segs[1] === 'klienci') {
      if (segs[2]) page = <KlientDetailPage navigate={navigate} clientId={segs[2]}/>;
      else page = <KlienciPage navigate={navigate}/>;
    } else if (segs[1] === 'zamowienia') {
      if (segs[2] === 'nowe') {
        page = <NoweZamowieniePage navigate={navigate} clientId={query.klient || 'stolarnia-kowalski'}/>;
      } else if (segs[2]) {
        const orderId = decodeURIComponent(segs.slice(2).join('/'));
        page = <ZamowienieDetailPage navigate={navigate} orderId={orderId} successOpen={query.success === '1'} onCloseSuccess={() => navigate('/panel/zamowienia/' + orderId)}/>;
      } else {
        page = <ZamowieniaListPage navigate={navigate}/>;
      }
    } else if (segs[1] === 'raporty') {
      if (segs[2] === 'stan-magazynu') page = <StanMagazynuPage navigate={navigate}/>;
      else if (segs[2] === 'co-zalega') page = <CoZalegaPage navigate={navigate}/>;
      else page = <RaportyIndexPage navigate={navigate}/>;
    } else if (segs[1] === 'dokumenty') {
      if (segs[2]) page = <DokumentDetailPage navigate={navigate} docId={decodeURIComponent(segs[2])}/>;
      else page = <DokumentyListPage navigate={navigate}/>;
    } else if (segs[1] === 'ustawienia') {
      page = <UstawieniaPage navigate={navigate}/>;
    } else {
      page = <DashboardPage navigate={navigate}/>;
    }
    return <PanelShell route={path} navigate={navigate} onLogout={onLogout}>{page}</PanelShell>;
  }

  return <HubStart onPanel={() => navigate('/panel')} onTerminal={() => navigate('/terminal')}/>;
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<ToastProvider><App/></ToastProvider>);
</script>
</body>
</html>
